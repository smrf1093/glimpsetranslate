name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Create DMG
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version in Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.VERSION }}" Resources/Info.plist

      - name: Build release binary
        run: swift build -c release

      - name: Assemble .app bundle
        run: make bundle

      - name: Create DMG
        run: make dmg

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cat > release_notes.md << 'NOTES_EOF'
          ## Glimpse Translate v${{ steps.version.outputs.VERSION }}

          ### Installation

          1. Download **GlimpseTranslate.dmg** below
          2. Open the DMG file
          3. Drag **Glimpse Translate** to your **Applications** folder
          4. Launch from Applications

          ### First Launch

          > **Important:** Since this app is not signed with an Apple Developer certificate, macOS will block it on first launch.

          To open it:
          1. Right-click (or Control-click) the app in Applications
          2. Select **Open** from the context menu
          3. Click **Open** in the dialog that appears
          4. You only need to do this once — subsequent launches work normally

          After launching, grant **Accessibility permission** when prompted:
          - Go to **System Settings → Privacy & Security → Accessibility**
          - Enable **Glimpse Translate**

          ### System Requirements

          - macOS 14.0 (Sonoma) or later
          - Apple Silicon (M1/M2/M3/M4) or Intel Mac

          NOTES_EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Glimpse Translate v${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: GlimpseTranslate.dmg
